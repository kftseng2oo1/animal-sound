<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界動物叫聲遊戲 🐾</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF6B9D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="動物叫聲">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Fredoka+One&display=swap');

:root {
  --yellow:#FFD93D; --pink:#FF6B9D; --orange:#FF8C42;
  --green:#2ECC71;  --blue:#3498DB;  --purple:#9B59B6;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:linear-gradient(180deg,#87CEEB 0%,#B0E0E6 38%,#5DBB63 38%,#5DBB63 54%,#C8A26B 54%);
  min-height:100vh; font-family:'Noto Sans TC',sans-serif;
  overflow:hidden; position:relative;
}

/* Sun */
.sun {
  position:absolute; top:18px; right:36px;
  width:66px; height:66px; background:#FFD93D; border-radius:50%;
  box-shadow:0 0 0 10px rgba(255,217,61,.3),0 0 0 22px rgba(255,217,61,.12);
  animation:spinSun 22s linear infinite;
}
.sun::before {
  content:''; position:absolute; inset:-14px;
  background:repeating-conic-gradient(#FFD93D 0deg 10deg,transparent 10deg 20deg);
  border-radius:50%; z-index:-1; opacity:.55;
}
@keyframes spinSun { to { transform:rotate(360deg); } }

/* Clouds */
.cloud {
  position:absolute; background:white; border-radius:50px; opacity:.88;
  animation:floatCloud linear infinite;
}
.cloud::before,.cloud::after { content:''; position:absolute; background:white; border-radius:50%; }
.c1{width:120px;height:38px;top:7%;left:-130px;animation-duration:26s}
.c1::before{width:58px;height:58px;top:-28px;left:14px}
.c1::after{width:44px;height:44px;top:-18px;left:50px}
.c2{width:90px;height:28px;top:14%;left:-100px;animation-duration:36s;animation-delay:-12s}
.c2::before{width:44px;height:44px;top:-24px;left:10px}
.c2::after{width:34px;height:34px;top:-14px;left:38px}
.c3{width:148px;height:44px;top:4%;left:-160px;animation-duration:42s;animation-delay:-22s}
.c3::before{width:68px;height:68px;top:-34px;left:18px}
.c3::after{width:52px;height:52px;top:-24px;left:62px}
@keyframes floatCloud { from{transform:translateX(0)} to{transform:translateX(112vw)} }

/* Flowers */
.flower {
  position:absolute; font-size:46px;
  animation:sway 3s ease-in-out infinite;
  filter:drop-shadow(0 4px 6px rgba(0,0,0,.14));
}
@keyframes sway { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(6deg)} }

/* Language screen */
#langScreen {
  position:fixed; inset:0;
  background:rgba(0,0,0,.82); backdrop-filter:blur(10px);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:1000; transition:opacity .4s,transform .4s;
}
#langScreen.hide { opacity:0; transform:scale(1.04); pointer-events:none; }
.lang-title {
  font-family:'Fredoka One',cursive; font-size:clamp(2rem,6vw,3.2rem);
  color:white; text-shadow:3px 3px 0 #FF6B9D; margin-bottom:6px;
}
.lang-sub { color:rgba(255,255,255,.7); font-size:1rem; margin-bottom:32px; }
.lang-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:0 24px; max-width:480px; width:100%; }
.lang-card {
  background:white; border:none; border-radius:22px;
  padding:20px 14px; cursor:pointer; text-align:center;
  box-shadow:0 6px 20px rgba(0,0,0,.18);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.lang-card:hover { transform:scale(1.07); box-shadow:0 10px 28px rgba(0,0,0,.25); }
.lang-card:active { transform:scale(.96); }
.lc-flag { font-size:2.6rem; }
.lc-name { font-family:'Fredoka One',cursive; font-size:1.25rem; color:#333; }
.lc-sub  { font-size:.8rem; color:#999; }

/* Header */
header { text-align:center; padding:14px 20px 8px; position:relative; z-index:10; }
header h1 {
  font-family:'Fredoka One',cursive; font-size:clamp(1.8rem,5vw,3rem);
  color:white; text-shadow:3px 3px 0 #FF6B9D,5px 5px 0 rgba(0,0,0,.1);
}
header p { font-size:clamp(.85rem,2.2vw,1.1rem); color:white; text-shadow:1px 1px 3px rgba(0,0,0,.3); margin-top:3px; }
.lang-indicator {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(255,255,255,.25); border-radius:20px; padding:4px 14px;
  color:white; cursor:pointer; margin-top:5px; font-weight:700; font-size:.9rem;
  transition:background .2s;
}
.lang-indicator:hover { background:rgba(255,255,255,.4); }

/* Stars */
.stars-bar { display:flex; justify-content:center; gap:7px; margin:6px 0 0; }
.star { font-size:26px; filter:grayscale(1); transition:filter .3s; }
.star.lit { filter:none; animation:popStar .4s ease; }
@keyframes popStar { 0%{transform:scale(1)} 50%{transform:scale(1.6)} 100%{transform:scale(1)} }

/* Stage */
.stage {
  display:flex; flex-direction:column; align-items:center;
  height:calc(100vh - 155px); z-index:5; padding-top:8px;
  transition:opacity .28s ease;
}

/* Question bubble */
.question-bubble {
  background:white; border-radius:22px; padding:12px 22px;
  font-size:clamp(1rem,2.8vw,1.4rem); font-weight:700; color:#333;
  box-shadow:0 6px 20px rgba(0,0,0,.15); margin-bottom:8px;
  text-align:center; max-width:88vw; position:relative;
  animation:bobble 2s ease-in-out infinite;
}
.question-bubble::after {
  content:''; position:absolute; bottom:-13px; left:50%;
  transform:translateX(-50%); border:7px solid transparent; border-top-color:white;
}
@keyframes bobble { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

/* Animal container */
.animal-container {
  position:relative; cursor:pointer; user-select:none;
  -webkit-tap-highlight-color:transparent;
  display:flex; flex-direction:column; align-items:center; margin-top:16px;
}
.animal-wrap { position:relative; display:flex; justify-content:center; align-items:flex-end; }

/* Sound bubble */
.sound-bubble {
  position:absolute; top:-56px; left:50%;
  transform:translateX(-50%) scale(0);
  background:var(--yellow); border-radius:18px;
  padding:9px 18px; font-size:1.3rem; font-weight:900; color:#333;
  box-shadow:0 4px 12px rgba(0,0,0,.2);
  opacity:0; white-space:nowrap; pointer-events:none; z-index:20;
  transition:opacity .3s cubic-bezier(.34,1.56,.64,1),transform .3s cubic-bezier(.34,1.56,.64,1);
}
.sound-bubble::before {
  content:''; position:absolute; bottom:-10px; left:50%;
  transform:translateX(-50%); width:13px; height:13px;
  background:var(--yellow); border-radius:50%;
}
.sound-bubble::after {
  content:''; position:absolute; bottom:-21px; left:50%;
  transform:translateX(-50%); width:8px; height:8px;
  background:var(--yellow); border-radius:50%;
}
.sound-bubble.show { opacity:1; transform:translateX(-50%) scale(1); }

/* Sound wave */
.sound-wave { display:none; align-items:flex-end; gap:4px; height:36px; margin-top:10px; }
.bar { width:7px; border-radius:4px; animation:wavePulse .6s ease-in-out infinite; }
.bar:nth-child(1){height:40%;background:#FF6B9D;animation-delay:0s}
.bar:nth-child(2){height:70%;background:#FF8C42;animation-delay:.1s}
.bar:nth-child(3){height:100%;background:#FFD93D;animation-delay:.2s}
.bar:nth-child(4){height:80%;background:#2ECC71;animation-delay:.15s}
.bar:nth-child(5){height:55%;background:#3498DB;animation-delay:.05s}
.bar:nth-child(6){height:90%;background:#9B59B6;animation-delay:.25s}
.bar:nth-child(7){height:45%;background:#FF6B9D;animation-delay:.1s}
@keyframes wavePulse { 0%,100%{transform:scaleY(.3);opacity:.6} 50%{transform:scaleY(1);opacity:1} }

/* Press hint */
.press-hint {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.85); border-radius:20px;
  padding:8px 18px; margin-top:14px;
  font-size:.95rem; font-weight:700; color:#555;
  box-shadow:0 3px 10px rgba(0,0,0,.1);
  animation:pulseHint 1.6s ease-in-out infinite;
}
@keyframes pulseHint { 0%,100%{box-shadow:0 3px 10px rgba(0,0,0,.1)} 50%{box-shadow:0 3px 20px rgba(255,107,157,.4)} }
.finger { font-size:1.4rem; animation:fingerTap 1s ease-in-out infinite; }
@keyframes fingerTap { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(6px) rotate(10deg)} }

/* Next button */
.next-btn {
  display:none; margin-top:14px; padding:12px 32px;
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  background:linear-gradient(135deg,#FF6B9D,#FF8C42);
  color:white; border:none; border-radius:50px; cursor:pointer;
  box-shadow:0 5px 18px rgba(255,107,157,.4);
  transition:transform .2s; letter-spacing:1px;
}
.next-btn.show { display:block; animation:popIn .4s cubic-bezier(.34,1.56,.64,1); }
.next-btn:hover { transform:scale(1.05); }
.next-btn:active { transform:scale(.97); }
@keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }

/* Confetti */
.confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:100; }
.confetti-piece { position:absolute; border-radius:2px; animation:confettiFall linear forwards; }
@keyframes confettiFall {
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* Result overlay */
.result-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.55);
  display:none; align-items:center; justify-content:center; z-index:500;
}
.result-overlay.show { display:flex; }
.result-card {
  background:white; border-radius:30px; padding:38px 48px;
  text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.3);
  max-width:90vw; animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
.res-emoji { font-size:4.5rem; }
.res-title { font-family:'Fredoka One',cursive; font-size:2.2rem; color:#FF6B9D; margin:10px 0; }
.res-sub   { font-size:1rem; color:#666; margin-bottom:22px; }
.res-btns  { display:flex; flex-direction:column; gap:10px; align-items:center; }
.btn-restart {
  padding:13px 34px; font-family:'Fredoka One',cursive; font-size:1.3rem;
  background:linear-gradient(135deg,#FFD93D,#FF8C42); color:white;
  border:none; border-radius:50px; cursor:pointer;
  box-shadow:0 5px 18px rgba(255,140,66,.4); transition:transform .2s;
}
.btn-restart:hover { transform:scale(1.05); }
.btn-lang {
  padding:9px 26px; font-family:'Fredoka One',cursive; font-size:1rem;
  background:white; color:#9B59B6; border:3px solid #9B59B6;
  border-radius:50px; cursor:pointer; transition:all .2s;
}
.btn-lang:hover { background:#9B59B6; color:white; transform:scale(1.04); }

/* Animal entrance */
.animal-enter { animation:animalIn .55s cubic-bezier(.34,1.56,.64,1); }
@keyframes animalIn { from{opacity:0;transform:scale(.4) translateY(40px)} to{opacity:1;transform:scale(1) translateY(0)} }
#animalSvg svg { filter:drop-shadow(0 8px 14px rgba(0,0,0,.2)); }
#animalSvg:active svg { transform:scale(.93) translateY(4px); transition:transform .1s; }
</style>
</head>

  try {
    var ac=getAC(),o=ac.createOscillator(),g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type='sine'; o.frequency.setValueAtTime(600,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(900,ac.currentTime+.08);
    g.gain.setValueAtTime(.35,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.18);
    o.start(); o.stop(ac.currentTime+.18);
  } catch(e){}
}
function sfxStar() {
  try {
    var ac=getAC();
    [0,80,160].forEach(function(d,i){
      var o=ac.createOscillator(),g=ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type='triangle'; o.frequency.value=880+i*220;
      g.gain.setValueAtTime(.3,ac.currentTime+d/1000);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d/1000+.2);
      o.start(ac.currentTime+d/1000); o.stop(ac.currentTime+d/1000+.2);
    });
  } catch(e){}
}
function sfxNext() {
  try {
    var ac=getAC(),o=ac.createOscillator(),g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type='sine'; o.frequency.setValueAtTime(400,ac.currentTime);
    o.frequency.linearRampToValueAtTime(600,ac.currentTime+.12);
    g.gain.setValueAtTime(.25,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.2);
    o.start(); o.stop(ac.currentTime+.2);
  } catch(e){}
}

// ── TTS ───────────────────────────────────────────────────────────
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = function(){ window.speechSynthesis.getVoices(); };
  window.speechSynthesis.getVoices();
}
function speakAnimal(animal) {
  if (!window.speechSynthesis) return;
  var lang   = DATA[curLang].ttsLang;
  var voices = window.speechSynthesis.getVoices();
  var match  = null;
  for (var i=0;i<voices.length;i++){
    if (voices[i].lang.startsWith(lang.split('-')[0])){ match=voices[i]; break; }
  }
  animal.tts.forEach(function(text,i){
    setTimeout(function(){
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang=lang; u.pitch=animal.p; u.rate=animal.r; u.volume=1;
      if (match) u.voice=match;
      window.speechSynthesis.speak(u);
    }, i*(animal.iv||0));
  });
}

// ── Game state ────────────────────────────────────────────────────
var curLang      = 'zh';
var curIdx       = 0;
var answered     = false;
var transitioning= false;
var sequence     = [];

function shuffle(arr) {
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}

function selectLang(lang) {
  curLang = lang;
  var d   = DATA[lang];
  var scr = document.getElementById('langScreen');
  scr.classList.add('hide');
  setTimeout(function(){ scr.style.display='none'; }, 420);

  document.getElementById('uiTitle').textContent       = d.title;
  document.getElementById('uiSub').textContent         = d.sub;
  document.getElementById('uiLangLabel').textContent   = d.flag+' '+d.label+' ▾';
  document.getElementById('nextBtn').textContent       = d.next;
  document.getElementById('btnRestart').textContent    = d.restart;
  document.getElementById('btnLang').textContent       = d.changeLang;
  document.getElementById('pressHintText').textContent = d.hint;

  sequence = shuffle(d.animals);
  curIdx=0; answered=false; transitioning=false;
  initStars();
  loadAnimal();
}

function openLang() {
  document.getElementById('resultOverlay').classList.remove('show');
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  var scr = document.getElementById('langScreen');
  scr.style.display = 'flex';
  scr.classList.remove('hide');
}

function initStars() {
  var bar = document.getElementById('starsBar');
  bar.innerHTML = '';
  sequence.forEach(function(_,i){
    var s=document.createElement('span');
    s.className='star'; s.textContent='⭐'; s.id='star'+i;
    bar.appendChild(s);
  });
}

function loadAnimal() {
  answered = false;
  var a = sequence[curIdx];
  document.getElementById('questionBubble').textContent = a.q;

  var svg = document.getElementById('animalSvg');
  svg.innerHTML = SVGS[a.svg]();
  svg.className = ''; void svg.offsetWidth; svg.className = 'animal-enter';

  document.getElementById('soundBubble').textContent = '';
  document.getElementById('soundBubble').classList.remove('show');
  document.getElementById('pressHint').style.display = 'flex';
  document.getElementById('wave').style.display = 'none';
  document.getElementById('nextBtn').className = 'next-btn';
  transitioning = false;
}

document.getElementById('animalBox').addEventListener('click', handlePress);
document.getElementById('animalBox').addEventListener('touchend', function(e){
  e.preventDefault(); handlePress();
});

function handlePress() {
  getAC(); // unlock iOS
  if (answered || transitioning) return;
  answered = true;

  var a = sequence[curIdx];
  sfxPop();
  speakAnimal(a);

  document.getElementById('soundBubble').textContent = a.s;
  document.getElementById('soundBubble').classList.add('show');
  document.getElementById('wave').style.display = 'flex';
  document.getElementById('pressHint').style.display = 'none';

  setTimeout(function(){
    sfxStar();
    var star = document.getElementById('star'+curIdx);
    if (star) star.classList.add('lit');
  }, 200);

  shootConfetti(30);

  setTimeout(function(){
    document.getElementById('nextBtn').className = 'next-btn show';
  }, 900);
}

function nextStep() {
  if (!answered || transitioning) return;
  transitioning = true;
  sfxNext();

  var stage = document.getElementById('stage');
  stage.style.opacity = '0';
  setTimeout(function(){
    curIdx++;
    if (curIdx >= sequence.length) {
      stage.style.opacity = '1';
      showResult();
    } else {
      loadAnimal();
      stage.style.opacity = '1';
    }
  }, 280);
}

function showResult() {
  var d = DATA[curLang];
  var emojis = ['🎉','🏆','🌟','🎊','🥳'];
  document.getElementById('resEmoji').textContent   = emojis[Math.floor(Math.random()*emojis.length)];
  document.getElementById('resTitle').textContent   = d.resTitle;
  document.getElementById('resSub').textContent     = d.resSub(sequence.length);
  document.getElementById('btnRestart').textContent = d.restart;
  document.getElementById('btnLang').textContent    = d.changeLang;
  document.getElementById('resultOverlay').classList.add('show');
  sfxStar(); sfxStar();
  shootConfetti(80);
}

function restartGame() {
  document.getElementById('resultOverlay').classList.remove('show');
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  sequence = shuffle(DATA[curLang].animals);
  curIdx=0; answered=false; transitioning=false;
  initStars();
  var stage = document.getElementById('stage');
  stage.style.opacity = '0';
  setTimeout(function(){ loadAnimal(); stage.style.opacity='1'; }, 100);
}

function shootConfetti(count) {
  var wrap   = document.getElementById('confettiWrap');
  var colors = ['#FF6B9D','#FFD93D','#FF8C42','#2ECC71','#3498DB','#9B59B6','#E74C3C','#1ABC9C'];
  for (var i=0; i<(count||30); i++) {
    (function(){
      var p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.cssText =
        'left:'+Math.random()*100+'vw;top:0;'
        +'background:'+colors[Math.floor(Math.random()*colors.length)]+';'
        +'width:'+(6+Math.random()*10)+'px;height:'+(6+Math.random()*10)+'px;'
        +'border-radius:'+(Math.random()>.5?'50%':'2px')+';'
        +'animation-duration:'+(1.5+Math.random()*2)+'s;'
        +'animation-delay:'+(Math.random()*.5)+'s;';
      wrap.appendChild(p);
      p.addEventListener('animationend', function(){ p.remove(); });
    })();
  }
}
// ── Service Worker registration ───────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js')
      .then(function(r){ console.log('SW registered:', r.scope); })
      .catch(function(e){
        // Silent on iOS WKWebView / non-HTTPS / file:// — game works fine without SW
      });
  });
}
</script>
